<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arqueidentidad: Omicron</title>
    <style>
        /*
         * Raw Document Brutalism Style System v3
         * con Lógica Móvil Mejorada
        */
        :root {
            --background-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
            --overlay-bg-color: rgba(0, 0, 0, 0.5);
            --button-bg-color: #f0f0f0;
            --button-text-color: #000000;
        }

        body.dark-mode {
            --background-color: #121212;
            --text-color: #e0e0e0;
            --border-color: #e0e0e0;
            --overlay-bg-color: rgba(255, 255, 255, 0.2);
            --button-bg-color: #333333;
            --button-text-color: #e0e0e0;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            padding: 1rem 2rem;
            margin: 0;
            transition: background-color 0.2s, color 0.2s;
        }

        main#content-container {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
        }

        @media (min-width: 1440px) {
            main#content-container {
                max-width: 720px;
            }
        }

        h1, h2, h3, h4, p, blockquote, ul, li {
            margin-block-start: 1em;
            margin-block-end: 1em;
        }

        p, li, blockquote {
            font-size: 1.3em;
            line-height: 1.6;
        }

        blockquote {
            white-space: pre-wrap;
            border-left: 2px solid var(--border-color);
            padding-left: 1em;
            margin-left: 1em;
        }

        button {
            background-color: var(--button-bg-color);
            color: var(--button-text-color);
            border: 1px solid var(--border-color);
        }

        #theme-toggle {
            position: fixed;
            top: 10px;
            right: 15px;
            cursor: pointer;
            padding: 5px 10px;
            z-index: 2000;
        }

        #highlighter-button {
            position: absolute;
            display: none;
            z-index: 100;
        }

        /* --- NUEVO: Botón Flotante para Móviles --- */
        #mobile-chat-trigger {
            display: none; /* Oculto por defecto */
            position: fixed;
            top: 12px;
            left: 12px;
            padding: 5px 10px;
            z-index: 1500;
            cursor: pointer;
            opacity: 0.9;
            transition: opacity 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        #mobile-chat-trigger.selection-mode {
            opacity: 1;
            box-shadow: 0 0 0 2px var(--border-color);
        }

        #mobile-chat-trigger.ready {
            border-style: solid;
        }

        #mobile-selection-hint {
            display: none;
            position: fixed;
            top: 60px;
            left: 12px;
            right: 12px;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            background-color: var(--background-color);
            color: var(--text-color);
            z-index: 1400;
            font-size: 0.95rem;
        }

        #mobile-selection-hint.visible {
            display: block;
        }

        /* --- NUEVO: Media Query para lógica móvil --- */
        @media (max-width: 768px) {
            #highlighter-button {
                display: none !important; /* Forzar ocultación del botón de escritorio en móviles */
            }
            #mobile-chat-trigger {
                display: block; /* Mostrar el botón flotante en móviles */
                pointer-events: auto;
            }
        }

        /* Cajón de chat */
        .drawer {
            position: fixed;
            left: 0;
            right: 0;
            bottom: -100%;
            background-color: var(--overlay-bg-color);
            display: flex;
            align-items: flex-end;
            z-index: 1000;
            transition: bottom var(--dur, 240ms) var(--ease, ease);
        }

        .drawer[aria-hidden="false"] {
            top: 0;
            bottom: 0;
        }

        .drawer-body {
            background-color: var(--background-color);
            border: 1px solid var(--border-color);
            padding: 1rem;
            width: 100%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .drawer-title {
            margin: 0;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .drawer-close-button {
            background: none;
            border: none;
            font-family: sans-serif;
            font-size: 24px;
            cursor: pointer;
            padding: 2px 6px;
            line-height: 1;
            color: var(--text-color);
        }

        /* Estilos del wizard */
        .wizard-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--overlay-bg-color);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2400;
        }

        .wizard-content {
            background-color: var(--background-color);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            width: 90%;
            max-width: 520px;
            text-align: left;
            position: relative;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
        }

        .wizard-content h2 {
            margin-top: 0;
        }

        #wizard-subtitle {
            font-size: 1.05em;
            margin: 0.25rem 0 1rem;
        }

        #wizard-instructions {
            margin: 0 0 1.25rem 1rem;
            padding-left: 1rem;
            list-style-position: inside;
        }

        #wizard-instructions li {
            margin-bottom: 0.5rem;
        }

        .wizard-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .wizard-actions label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95em;
        }

        .wizard-actions button {
            padding: 5px 10px;
        }

        #chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }

        .chat-message {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            max-width: min(85%, 520px);
            border: 1px solid var(--border-color);
            padding: 0.75rem 0.85rem;
            background-color: var(--background-color);
        }

        .chat-message .message-label {
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            opacity: 0.75;
        }

        .chat-message .message-body {
            font-size: 1em;
            line-height: 1.6;
        }

        .chat-message .message-body :where(p, ul, ol, li, strong, em, blockquote) {
            margin: 0.25em 0;
        }

        .chat-message .message-body :where(ul, ol) {
            padding-left: 1.25rem;
        }

        .model-message {
            align-self: flex-start;
            border-left-width: 3px;
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--button-bg-color);
            border-right-width: 3px;
            color: var(--button-text-color);
        }

        .user-message .message-label {
            text-align: right;
        }

        #chat-form { display: flex; }
        #chat-input {
            flex-grow: 1;
            margin-right: 0.5rem;
            resize: none;
            height: 3rem;
        }
    </style>
</head>
<body>

    <button id="theme-toggle">Modo Oscuro</button>

    <main id="content-container">
        <!-- El contenido se generará aquí por JavaScript -->
    </main>

    <!-- Elementos de la Interfaz Interactiva -->
    <button id="highlighter-button">Conversar</button>
    <button id="mobile-chat-trigger" aria-expanded="false">Conversar</button>
    <div id="mobile-selection-hint" role="status" aria-live="polite"></div>

    <!-- CAJÓN DE CHAT -->
    <aside id="chat-drawer" class="drawer" aria-hidden="true" inert>
        <div class="drawer-body">
            <div class="drawer-header">
                <p class="drawer-title">Chat contextual</p>
                <button class="drawer-close-button" id="drawer-close" aria-label="Cerrar chat">×</button>
            </div>
            <div id="chat-history" role="log" aria-live="polite"></div>
            <form id="chat-form">
                <textarea id="chat-input" placeholder="Haz una pregunta..." required></textarea>
                <button type="submit">Enviar</button>
            </form>
        </div>
    </aside>

    <!-- WIZARD / TUTORIAL DE BIENVENIDA -->
    <div class="wizard-overlay" id="wizard" role="dialog" aria-modal="true" aria-labelledby="wizard-title" aria-hidden="true">
        <div class="wizard-content">
            <h2 id="wizard-title">Bienvenido</h2>
            <p id="wizard-subtitle"></p>
            <ol id="wizard-instructions"></ol>
            <div class="wizard-actions">
                <label for="wizard-dont-show"><input type="checkbox" id="wizard-dont-show"> No mostrar de nuevo</label>
                <button id="wizard-close" type="button">Comenzar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="main.js"></script>

</body>
</html>
