<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arqueidentidad: Omicron</title>
    <style>
        /*
         * Raw Document Brutalism Style System v3
         * con Lógica Móvil Mejorada
        */
        :root {
            --background-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
            --overlay-bg-color: rgba(0, 0, 0, 0.5);
            --button-bg-color: #f0f0f0;
            --button-text-color: #000000;
        }

        body.dark-mode {
            --background-color: #121212;
            --text-color: #e0e0e0;
            --border-color: #e0e0e0;
            --overlay-bg-color: rgba(255, 255, 255, 0.2);
            --button-bg-color: #333333;
            --button-text-color: #e0e0e0;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            padding: 1rem 2rem;
            margin: 0;
            transition: background-color 0.2s, color 0.2s;
        }

        h1, h2, h3, h4, p, blockquote, ul, li {
            margin-block-start: 1em;
            margin-block-end: 1em;
        }

        p, li, blockquote {
            font-size: 1.1em;
            line-height: 1.6;
        }

        blockquote {
            white-space: pre-wrap;
            border-left: 2px solid var(--border-color);
            padding-left: 1em;
            margin-left: 1em;
        }

        button {
            background-color: var(--button-bg-color);
            color: var(--button-text-color);
            border: 1px solid var(--border-color);
        }

        #theme-toggle {
            position: fixed;
            top: 10px;
            right: 15px;
            cursor: pointer;
            padding: 5px 10px;
            z-index: 2000;
        }

        #highlighter-button {
            position: absolute;
            display: none;
            z-index: 100;
        }

        /* --- NUEVO: Botón Flotante para Móviles --- */
        #mobile-chat-trigger {
            display: none; /* Oculto por defecto */
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 25px; /* Para hacerlo más redondeado */
            z-index: 999;
            cursor: pointer;
            opacity: 0.5; /* Estado inactivo */
            pointer-events: none; /* No se puede hacer clic cuando está inactivo */
            transition: opacity 0.2s;
        }

        #mobile-chat-trigger.active {
            opacity: 1; /* Estado activo */
            pointer-events: auto; /* Se puede hacer clic */
        }

        /* --- NUEVO: Media Query para lógica móvil --- */
        @media (max-width: 768px) {
            #highlighter-button {
                display: none !important; /* Forzar ocultación del botón de escritorio en móviles */
            }
            #mobile-chat-trigger {
                display: block; /* Mostrar el botón flotante en móviles */
            }
        }

        .modal-overlay, .wizard-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--overlay-bg-color);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content, .wizard-content {
            background-color: var(--background-color);
            border: 1px solid var(--border-color);
            padding: 1rem;
            width: 90%;
            position: relative;
        }

        .modal-content {
            max-width: 600px;
            height: 80%;
            max-height: 700px;
            display: flex;
            flex-direction: column;
        }

        .wizard-content {
            max-width: 500px;
            text-align: center;
        }

        .modal-close-button {
            position: absolute;
            top: 5px;
            right: 10px;
            background: none;
            border: none;
            font-family: sans-serif;
            font-size: 24px;
            cursor: pointer;
            padding: 5px;
            line-height: 1;
            color: var(--text-color);
        }

        #selected-text-container {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-bottom: 0.5rem;
            font-style: italic;
            max-height: 100px;
            overflow-y: auto;
        }

        #chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }

        #chat-history p { margin: 0.5em 0; font-size: 1em; }
        #chat-history .user-message { font-weight: bold; }
        #chat-history .model-message { white-space: pre-wrap; }

        #chat-form { display: flex; }
        #chat-input { flex-grow: 1; margin-right: 0.5rem; }
    </style>
</head>
<body>

    <button id="theme-toggle">Modo Oscuro</button>

    <main id="content-container">
        <!-- El contenido se generará aquí por JavaScript -->
    </main>

    <!-- Elementos de la Interfaz Interactiva -->
    <button id="highlighter-button">Conversar</button>
    <button id="mobile-chat-trigger">💬 Conversar</button> <!-- NUEVO BOTÓN -->

    <!-- MODAL DEL CHAT -->
    <div class="modal-overlay" id="ai-modal">
        <div class="modal-content">
            <button class="modal-close-button" id="modal-close">X</button>
            <h4>Conversando sobre:</h4>
            <div id="selected-text-container"></div>
            <div id="chat-history"></div>
            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Haz una pregunta..." required>
                <button type="submit">Enviar</button>
            </form>
        </div>
    </div>

    <!-- WIZARD / TUTORIAL DE BIENVENIDA -->
    <div class="wizard-overlay" id="wizard">
        <div class="wizard-content">
            <h2>Bienvenido a Arqueidentidad: Omicron</h2>
            <p style="font-size: 1.2em;">Esta es una página interactiva.</p>
            <p><strong>Selecciona cualquier fragmento de texto</strong> para iniciar una conversación con una IA experta sobre ese concepto.</p>
            <button id="wizard-close">Entendido</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
